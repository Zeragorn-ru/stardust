# Сборка stardust-mod и публикация в GitHub Release.
# Триггер — git-тег mod-vX.Y.Z. Для проверки без релиза: ci.yml (target=mod).

name: mod-release

on:
  push:
    tags:
      - "mod-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия мода (без mod-v), для ручного прогона"
        type: string
        default: "0.0.0-dev"
      upload_release:
        description: "Создать/обновить GitHub Release"
        type: boolean
        default: false
      release_tag:
        description: "Тег релиза (mod-vX.Y.Z), если upload_release=true"
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#mod-v}"
          echo "MOD_VERSION=$version" >> $GITHUB_ENV
          bash scripts/ci/set-mod-version.sh "$version"

      - name: Set version (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          echo "MOD_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          bash scripts/ci/set-mod-version.sh "${{ github.event.inputs.version }}"

      - name: Build mod jar
        working-directory: stardust-mod
        run: ./gradlew build

      - name: Find jar file
        id: find-jar
        run: |
          jar=$(ls stardust-mod/build/libs/*.jar | grep -v sources | head -1)
          echo "jar_path=$jar" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename "$jar")" >> $GITHUB_OUTPUT
          echo "Found jar: $jar"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: stardust-mod-jar
          path: ${{ steps.find-jar.outputs.jar_path }}
          retention-days: 14

      - name: Create release
        if: >-
          startsWith(github.ref, 'refs/tags/') ||
          (github.event.inputs.upload_release == 'true' && github.event.inputs.release_tag != '')
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          title="Stardust Mod $tag"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --generate-notes
            echo "Created release $tag"
          else
            echo "Release $tag already exists"
          fi

      - name: Upload jar to release
        if: >-
          startsWith(github.ref, 'refs/tags/') ||
          (github.event.inputs.upload_release == 'true' && github.event.inputs.release_tag != '')
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          jar="${{ steps.find-jar.outputs.jar_path }}"
          bash scripts/ci/sha256-file.sh "$jar" > "${jar}.sha256"
          gh release upload "$tag" "$jar" "${jar}.sha256" --clobber
