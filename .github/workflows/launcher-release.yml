# Сборка лаунчера (Tauri) и публикация в GitHub Release.
#
# Триггер — git-тег вида v1.2.3. tauri-action собирает установщики и кладёт
# их в Release. Установленные лаунчеры сами опрашивают GitHub Releases API
# и при наличии новой версии скачивают и запускают установщик (см. update.rs).
# Подпись апдейтов не используется.

name: launcher-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "launcher/src-tauri -> target"

      - name: Install frontend deps
        working-directory: launcher
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: launcher
          tagName: ${{ github.ref_name }}
          releaseName: "Launcher ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
