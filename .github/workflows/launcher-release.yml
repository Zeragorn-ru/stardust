# Сборка лаунчера (Tauri) и публикация в GitHub Release.
#
# Триггер релиза — git-тег вида v1.2.3. tauri-action собирает установщики и
# кладёт их в Release. Установленные лаунчеры сами опрашивают GitHub Releases
# API и при наличии новой версии скачивают и запускают установщик (см.
# update.rs). Подпись апдейтов не используется.

name: launcher-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # Linux: webkit2gtk 4.1 стабильно работает на 22.04; на 24.04 у Tauri
          # известны проблемы с пустым/белым окном webview, поэтому держим 22.04.
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "launcher/src-tauri -> target"

      - name: Install frontend deps
        working-directory: launcher
        run: npm ci

      # Версия в файлах — плейсхолдер 0.0.0. Подставляем реальную из тега
      # (vX.Y.Z -> X.Y.Z) в package.json, Cargo.toml, tauri.conf.json и
      # Cargo.lock перед сборкой. Источник правды — git-тег.
      # ВАЖНО: это делается ПОСЛЕ rust-cache, иначе правка Cargo.lock
      # инвалидирует кэш и всё компилируется заново каждый релиз.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Setting version to $version"
          perl -0pi -e "s/(\"version\"\s*:\s*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/" launcher/package.json
          perl -0pi -e "s/(\"version\"\s*:\s*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/" launcher/src-tauri/tauri.conf.json
          perl -0pi -e "s/^(version\s*=\s*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/m" launcher/src-tauri/Cargo.toml
          perl -0pi -e "s/(name = \"launcher\"\nversion = \")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/" Cargo.lock

      # Создаём релиз заранее как ЧЕРНОВИК, с ретраем. GITHUB_TOKEN иногда
      # отдаётся на свежий тег ещё с read-доступом (транзиентный 403 на
      # create-release у tauri-action) — повторная попытка через паузу это
      # лечит. Черновик не виден пользователям, поэтому пустой релиз не
      # «висит» на странице релизов, пока идёт сборка. Дальше tauri-action
      # находит готовый черновик, заливает ассеты и снимает черновик
      # (releaseDraft: false), так что публикуется только готовый релиз.
      - name: Ensure draft release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          tag="$GITHUB_REF_NAME"
          for attempt in 1 2 3; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag already exists."; exit 0
            fi
            if gh release create "$tag" --draft --title "Launcher $tag" --notes ""; then
              echo "Created draft release $tag."; exit 0
            fi
            echo "Attempt $attempt to create release failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Could not create release $tag after 3 attempts."
          exit 1

      # На тегах — собрать установщики и залить ассеты в уже созданный Release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          projectPath: launcher
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Launcher {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
