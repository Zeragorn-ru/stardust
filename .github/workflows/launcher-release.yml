# Сборка лаунчера (Tauri) и публикация в GitHub Release.
#
# Секреты задаются на уровне job env (не в composite actions).
# macOS job использует environment launcher-release для Apple secrets.

name: launcher-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Платформа (all = matrix)"
        type: choice
        default: all
        options:
          - all
          - windows
          - linux
          - macos

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows
            platform: windows
            runner: windows-latest
            tauri-args: ""
          - id: linux
            platform: linux
            runner: ubuntu-22.04
            tauri-args: ""
          - id: macos
            platform: macos
            runner: macos-latest
            tauri-args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.runner }}
    # Пустая строка = без deployment environment (только macOS использует launcher-release).
    environment: ${{ matrix.id == 'macos' && 'launcher-release' || '' }}
    env:
      CI: true
      GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "① Linux deps"
        if: matrix.platform == 'linux'
        uses: ./.github/actions/launcher-setup-linux

      - name: "② Toolchain & caches"
        uses: ./.github/actions/launcher-setup-toolchain
        with:
          platform: ${{ matrix.runner }}
          cache-key-suffix: release
          save-cache: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: "③ npm ci"
        uses: ./.github/actions/launcher-install-deps

      - name: "④ Clippy"
        uses: ./.github/actions/launcher-clippy

      - name: "⑤ Bootstrap (Windows)"
        if: startsWith(github.ref, 'refs/tags/') && matrix.id == 'windows'
        uses: ./.github/actions/launcher-build-bootstrap
        with:
          platform: ${{ matrix.runner }}

      - name: "⑥ Set version from tag"
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/launcher-set-version
        with:
          version: ${{ github.ref_name }}

      - name: "⑦ Wait for token"
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/launcher-wait-token

      - name: "⑦b macOS signing"
        if: matrix.id == 'macos' && secrets.APPLE_CERTIFICATE != ''
        uses: ./.github/actions/launcher-setup-macos-signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: "⑧ Tauri build"
        uses: ./.github/actions/launcher-tauri-build
        with:
          tauri-args: ${{ matrix.tauri-args }}
          signing: ${{ matrix.id == 'macos' && secrets.APPLE_CERTIFICATE != '' && 'true' || 'false' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}

      - name: "⑧b DMG webloc"
        if: matrix.id == 'macos' && secrets.APPLE_CERTIFICATE != ''
        uses: ./.github/actions/launcher-inject-dmg-webloc
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}

      - name: "⑨ Bundle update script (macOS)"
        if: matrix.id == 'macos'
        run: |
          APP_PATH=$(find target -path '*/bundle/macos/*.app' -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            RESOURCES="$APP_PATH/Contents/Resources"
            mkdir -p "$RESOURCES"
            cp scripts/ci/update-macos.sh "$RESOURCES/"
            chmod +x "$RESOURCES/update-macos.sh"
            echo "Bundled update-macos.sh in $RESOURCES"
          fi

      - name: "⑩ Create .app.zip (macOS)"
        if: matrix.id == 'macos'
        run: |
          # Find .app bundle in target directory.
          APP_PATH=$(find target -path '*/bundle/macos/*.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "WARNING: .app bundle not found, skipping .app.zip"
            exit 0
          fi
          APP_NAME=$(basename "$APP_PATH" .app)
          ZIP_NAME="${APP_NAME}.app.zip"
          echo "Creating $ZIP_NAME from $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          mkdir -p dist/launcher-bundles
          cp "$ZIP_NAME" dist/launcher-bundles/
          echo "Created $ZIP_NAME ($(du -h "$ZIP_NAME" | cut -f1))"

      - name: "⑪ Collect bundles"
        if: always()
        uses: ./.github/actions/launcher-collect-bundles

      - name: "⑫ Upload CI artifacts"
        if: always()
        uses: ./.github/actions/launcher-upload-ci-artifacts
        with:
          artifact-name: launcher-release-${{ matrix.id }}

      - name: "⑬ Upload GitHub Release"
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/launcher-upload-release
        with:
          tag: ${{ github.ref_name }}
