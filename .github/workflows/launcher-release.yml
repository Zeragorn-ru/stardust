# Сборка лаунчера (Tauri) и публикация в GitHub Release.
#
# Триггер релиза — git-тег вида v1.2.3. tauri-action собирает установщики и
# кладёт их в Release. Установленные лаунчеры сами опрашивают GitHub Releases
# API и при наличии новой версии скачивают и запускают установщик (см.
# update.rs).

name: launcher-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "launcher-${{ matrix.platform }}"
          save-if: ${{ startsWith(github.ref, 'refs/tags/') }}
          cache-on-failure: true

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: launcher/node_modules
          key: npm-${{ matrix.platform }}-${{ hashFiles('launcher/package-lock.json') }}
          restore-keys: npm-${{ matrix.platform }}-

      - name: Install frontend deps
        working-directory: launcher
        run: npm ci

      # Clippy: проверка перед сборкой. Компилирует зависимости в профиле
      # launcher-release — tauri-action переиспользует те же артефакты.
      - name: Clippy
        run: cargo clippy -p launcher --profile launcher-release -- -D warnings

      # Bootstrap: на Windows + теги.
      - name: Cache bootstrap
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: crates/bootstrap/target
          key: bootstrap-${{ matrix.platform }}-${{ hashFiles('crates/bootstrap/**') }}
          restore-keys: bootstrap-${{ matrix.platform }}-

      - name: Build bootstrap
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p launcher/src-tauri/nsis
          if [ -f crates/bootstrap/target/release/bootstrap.exe ]; then
            echo "Bootstrap cache hit, skipping build"
          else
            echo "Building bootstrap from source"
            cargo clippy --manifest-path crates/bootstrap/Cargo.toml --release -- -D warnings && \
            cargo build --manifest-path crates/bootstrap/Cargo.toml --release
          fi
          cp crates/bootstrap/target/release/bootstrap.exe launcher/src-tauri/nsis/bootstrap.exe

      # Версия из тега.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Setting version to $version"
          perl -0pi -e "s/(\"version\"\s*:\s*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/" launcher/package.json
          perl -0pi -e "s/(\"version\"\s*:\s*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/" launcher/src-tauri/tauri.conf.json
          perl -0pi -e "s/^(version\s*=\s*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/m" launcher/src-tauri/Cargo.toml
          perl -0pi -e "s/(name = \"launcher\"\nversion = \")[0-9]+\.[0-9]+\.[0-9]+(\")/\${1}$version\${2}/" Cargo.lock
          if ! grep -q "$version" launcher/package.json; then
            echo "ERROR: version replacement failed in package.json"
            exit 1
          fi

      # Пауза перед tauri-action.
      - name: Wait for token propagation
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: sleep 15

      # Сборка установщиков.
      - uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          projectPath: launcher
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} -- --profile launcher-release

      # Создаём релиз и загружаем ВСЕ ассеты.
      - name: Create release and upload all assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="Launcher $tag"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --generate-notes
            echo "Created release $tag"
          else
            echo "Release $tag already exists"
          fi

          for dir in target/launcher-release/bundle/nsis target/launcher-release/bundle/macos target/launcher-release/bundle/deb; do
            if [ -d "$dir" ]; then
              for ext in exe dmg AppImage deb; do
                for artifact in "$dir"/*."$ext"; do
                  [ -f "$artifact" ] || continue
                  sha256sum "$artifact" | awk '{print $1}' > "${artifact}.sha256"
                  echo "Uploading $(basename "$artifact") and checksum"
                  gh release upload "$tag" "$artifact" "${artifact}.sha256" --clobber
                done
              done
            fi
          done

          bs="launcher/src-tauri/nsis/bootstrap.exe"
          if [ -f "$bs" ]; then
            sha256sum "$bs" | awk '{print $1}' > "${bs}.sha256"
            echo "Uploading bootstrap.exe"
            gh release upload "$tag" "$bs" "${bs}.sha256" --clobber
          fi

  # === Бета: нативный лаунчер (Iced) ===
  beta:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "beta-${{ matrix.platform }}"
          save-if: ${{ startsWith(github.ref, 'refs/tags/') }}
          cache-on-failure: true

      # Clippy нативного лаунчера.
      - name: Clippy native launcher
        run: cargo clippy -p stardust-native --release -- -D warnings

      # Сборка нативного лаунчера.
      - name: Build native launcher
        run: cargo build -p stardust-native --release

      # Версия из тега и ренейм бинарника.
      - name: Set version and rename binary
        id: bin
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ] || [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="$(grep '^version' native-launcher/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            src="target/release/stardust-native.exe"
            dst="stardust-native-v${version}.exe"
            cp "$src" "$dst"
            echo "exe=$dst" >> $GITHUB_OUTPUT
            echo "path=$dst" >> $GITHUB_OUTPUT
            echo "platform_key=windows-x86_64" >> $GITHUB_OUTPUT
          else
            src="target/release/stardust-native"
            dst="stardust-native-v${version}"
            cp "$src" "$dst"
            echo "exe=$dst" >> $GITHUB_OUTPUT
            echo "path=$dst" >> $GITHUB_OUTPUT
            echo "platform_key=linux-x86_64" >> $GITHUB_OUTPUT
          fi

      # Bootstrap (beta) — только Windows.
      - name: Cache bootstrap
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: crates/bootstrap/target
          key: bootstrap-${{ matrix.platform }}-${{ hashFiles('crates/bootstrap/**') }}
          restore-keys: bootstrap-${{ matrix.platform }}-

      - name: Build bootstrap (beta)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cargo clippy --manifest-path crates/bootstrap/Cargo.toml --release -- -D warnings && \
          cargo build --manifest-path crates/bootstrap/Cargo.toml --release

      # NSIS installer — только Windows.
      - name: Build NSIS installer
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        shell: bash
        run: |
          choco install nsis -y
          version="${{ steps.bin.outputs.version }}"
          cp "${{ steps.bin.outputs.path }}" native-launcher/stardust-native.exe
          cp crates/bootstrap/target/release/bootstrap.exe native-launcher/bootstrap.exe
          "/c/Program Files (x86)/NSIS/makensis.exe" \
            -DVERSION="$version" \
            -DEXE_PATH=stardust-native.exe \
            -DBS_PATH=bootstrap.exe \
            native-launcher/installer.nsi

      # Загрузка в release.
      - name: Upload beta artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          exe="${{ steps.bin.outputs.exe }}"
          path="${{ steps.bin.outputs.path }}"
          version="${{ steps.bin.outputs.version }}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "Launcher $tag" --generate-notes
          fi

          sha256sum "$path" | awk '{print $1}' > "${path}.sha256"
          gh release upload "$tag" "$path" "${path}.sha256" --clobber

          # Считаем sha256 и size для portable бинарника.
          portable_sha=$(cat "${path}.sha256")
          portable_size=$(stat -c%s "$path" 2>/dev/null || stat -f%z "$path" 2>/dev/null)

          # NSIS installer (Windows only)
          installer="stardust-native-v${version}-setup.exe"
          installer_sha=""
          installer_size=""
          if [ -f "$installer" ]; then
            sha256sum "$installer" | awk '{print $1}' > "${installer}.sha256"
            installer_sha=$(cat "${installer}.sha256")
            installer_size=$(stat -c%s "$installer" 2>/dev/null || stat -f%z "$installer" 2>/dev/null)
            echo "Uploading $installer"
            gh release upload "$tag" "$installer" "${installer}.sha256" --clobber
          fi

          # Bootstrap beta (bootstrap-beta.exe)
          bs="crates/bootstrap/target/release/bootstrap.exe"
          if [ -f "$bs" ]; then
            cp "$bs" bootstrap-beta.exe
            sha256sum bootstrap-beta.exe | awk '{print $1}' > bootstrap-beta.exe.sha256
            echo "Uploading bootstrap-beta.exe"
            gh release upload "$tag" bootstrap-beta.exe bootstrap-beta.exe.sha256 --clobber
          fi

          # Генерация latest-beta.json.
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          base_url="https://github.com/Zeragorn-ru/stardust/releases/download/${tag}"

          export VERSION_VAR="$version"
          export TAG_VAR="$tag"
          export PUB_DATE_VAR="$pub_date"
          export INSTALLER_VAR="$installer"
          export INSTALLER_SHA_VAR="$installer_sha"
          export INSTALLER_SIZE_VAR="$installer_size"
          export PORTABLE_VAR="$path"
          export PORTABLE_SHA_VAR="$portable_sha"
          export PORTABLE_SIZE_VAR="$portable_size"
          export BASE_URL_VAR="$base_url"

          python3 << 'PYEOF'
          import json, sys, os

          version = os.environ.get("VERSION_VAR", "")
          tag = os.environ.get("TAG_VAR", "")
          pub_date = os.environ.get("PUB_DATE_VAR", "")
          installer = os.environ.get("INSTALLER_VAR", "")
          installer_sha = os.environ.get("INSTALLER_SHA_VAR", "")
          installer_size = os.environ.get("INSTALLER_SIZE_VAR", "")
          portable = os.environ.get("PORTABLE_VAR", "")
          portable_sha = os.environ.get("PORTABLE_SHA_VAR", "")
          portable_size = os.environ.get("PORTABLE_SIZE_VAR", "")
          base_url = os.environ.get("BASE_URL_VAR", "")

          d = {
              "version": version,
              "notes": f"Beta release {tag}",
              "pub_date": pub_date,
              "platforms": {}
          }

          if installer and installer_sha:
              import urllib.parse
              url = f"{base_url}/{urllib.parse.quote(installer)}"
              d["platforms"]["windows-x86_64"] = {
                  "url": url,
                  "sha256": installer_sha,
                  "size": int(installer_size) if installer_size else 0
              }

          with open("latest-beta.json", "w") as f:
              json.dump(d, f, indent=2)
          PYEOF

          gh release upload "$tag" latest-beta.json --clobber
          echo "Uploaded latest-beta.json"
