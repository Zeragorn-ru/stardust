# Сборка и публикация Docker-образов бекенда в ghcr.io.
#
# Публикуются три образа: auth-server, admin-server (оба из deploy/Dockerfile,
# разные target-стейджи) и admin-web (SPA + nginx, deploy/admin-web.Dockerfile).
#
# Деплой автоматический: после успешной сборки и пуша образов CI подключается
# по SSH к серверу, делает git pull и перезапускает контейнеры.

name: backend

on:
  push:
    branches: [master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "admin-web/**"
      - "deploy/Dockerfile"
      - "deploy/admin-web.Dockerfile"
      - "deploy/admin-web.nginx.conf"
      - "deploy/squid.conf"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build + test (auth-server, admin-server, telegram-bot, store, protocol)
        run: cargo test -p auth-server -p admin-server -p telegram-bot -p store -p protocol

  image:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: auth-server
            dockerfile: deploy/Dockerfile
            target: auth-server
          - name: admin-server
            dockerfile: deploy/Dockerfile
            target: admin-server
          - name: telegram-bot
            dockerfile: deploy/Dockerfile
            target: telegram-bot
          - name: admin-web
            dockerfile: deploy/admin-web.Dockerfile
            target: admin-web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>/<service> — owner/repo берутся из контекста.
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          # latest для ветки + неизменяемый тег по sha коммита.
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Контекст — корень воркспейса; Dockerfile в deploy/.
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Upload deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/squid.conf,deploy/.env.example"
          target: "/opt/stardust/"
          strip_components: 1

      - name: Pull images and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/stardust/deploy
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
