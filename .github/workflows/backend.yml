# Сборка и публикация Docker-образа auth-server в ghcr.io.
#
# Деплой ручной: после успешного пуша образа зайди на сервер и выполни
#   cd deploy && docker compose pull && docker compose up -d
# (Образ не изменился по digest — compose ничего не перезапустит.)

name: backend

on:
  push:
    branches: [master]
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "deploy/Dockerfile"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  # ghcr.io/<owner>/<repo>/auth-server — owner/repo берутся из контекста.
  IMAGE: ghcr.io/${{ github.repository }}/auth-server

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build + test (auth-server, store, protocol)
        run: cargo test -p auth-server -p store -p protocol

  image:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # latest для ветки + неизменяемый тег по sha коммита.
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Контекст — корень воркспейса; Dockerfile в deploy/.
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
