# Сборка и публикация Docker-образов бекенда в ghcr.io.
#
# Публикуются пять образов: auth-server, admin-server, telegram-bot (slim,
# из готовых бинарей через deploy/runtime.Dockerfile), admin-web (SPA + nginx,
# deploy/admin-web.Dockerfile) и website (лендинг + nginx,
# deploy/website.Dockerfile).
#
# Ключевая оптимизация: тяжёлая Rust-компиляция (lto=fat, codegen-units=1)
# происходит РОВНО ОДИН РАЗ в job `build` — там же тесты и инкрементальный
# кэш cargo (Swatinem/rust-cache). Три бинаря уезжают артефактами, а matrix-job
# `image` лишь пакует готовый бинарь в slim-образ (компиляции в Docker нет).
#
# Деплой автоматический: после успешной сборки и пуша образов CI подключается
# по SSH к серверу и перезапускает контейнеры.

name: backend

on:
  push:
    branches: [master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "admin-web/**"
      - "website/**"
      - "deploy/runtime.Dockerfile"
      - "deploy/admin-web.Dockerfile"
      - "deploy/admin-web.nginx.conf"
      - "deploy/website.Dockerfile"
      - "deploy/website.nginx.conf"
      - "deploy/squid.conf"
      - ".github/workflows/backend.yml"
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Собрать образы, но не деплоить на сервер"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    # КРИТИЧНО: компилируем внутри той же базы (Debian 12 bookworm, glibc 2.36),
    # что и рантайм-образ (debian:bookworm-slim). Иначе бинарь линкуется против
    # более новой glibc раннера (ubuntu-latest = 24.04, glibc 2.39) и падает в
    # рантайме с `version GLIBC_2.38 not found` — glibc только вперёд-совместима.
    # Минор Rust зафиксирован (а не плавающий rust:bookworm), чтобы ключ
    # rust-cache не дрейфовал при выходе новой версии Rust — обновляем осознанно.
    container: rust:1.96-bookworm
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "backend"
          # Сохраняем кеш только на мастер-ветке; PR и workflow_dispatch не трогают кеш.
          save-if: ${{ github.ref == 'refs/heads/master' }}
          # Сохранять кеш даже при упавшей джобе, чтобы скомпилированные зависимости
          # не пересобирались с нуля на каждом последующем (падающем) прогоне.
          cache-on-failure: true
      - name: Test (auth-server, admin-server, telegram-bot, store, protocol)
        run: cargo test -p auth-server -p admin-server -p telegram-bot -p store -p protocol
      # Тяжёлая release-сборка всех серверных бинарей за один прогон.
      # Инкрементальный target/ переживает прогоны благодаря rust-cache.
      - name: Build release binaries
        run: cargo build --release -p auth-server -p admin-server -p telegram-bot
      # Каждый бинарь — отдельный артефакт, чтобы image-job скачивал только свой.
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: |
            target/release/auth-server
            target/release/admin-server
            target/release/telegram-bot
          retention-days: 1
          if-no-files-found: error

  image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # Rust-сервисы: пакуются из готового бинаря (kind: rust).
          - name: auth-server
            kind: rust
          - name: admin-server
            kind: rust
          - name: telegram-bot
            kind: rust
          # SPA: собирается из исходников (kind: web).
          - name: admin-web
            kind: web
          # Публичный сайт (лендинг): статика на nginx (kind: web).
          - name: website
            kind: web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>/<service> — owner/repo берутся из контекста.
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          # latest для ветки + неизменяемый тег по sha коммита.
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/setup-buildx-action@v3

      # --- Rust-сервисы: берём готовый бинарь, пакуем в slim-образ ---
      - name: Download server binaries
        if: matrix.kind == 'rust'
        uses: actions/download-artifact@v4
        with:
          name: server-binaries
          path: bin
      - name: Make binary executable
        if: matrix.kind == 'rust'
        run: chmod +x bin/${{ matrix.name }}
      - name: Build and push (rust)
        if: matrix.kind == 'rust'
        uses: docker/build-push-action@v6
        with:
          # Контекст — только каталог bin/ с бинарями; компиляции нет.
          context: bin
          file: deploy/runtime.Dockerfile
          target: ${{ matrix.name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # --- admin-web: сборка SPA из исходников ---
      - name: Build and push (web)
        if: matrix.kind == 'web' && matrix.name == 'admin-web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/admin-web.Dockerfile
          target: admin-web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # --- website: статика на nginx ---
      - name: Build and push (website)
        if: matrix.kind == 'web' && matrix.name == 'website'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/website.Dockerfile
          target: website
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: image
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/master' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Upload deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/squid.conf"
          # На сервере compose-файлы и data/, logs/ лежат прямо в /opt/stardust.
          # strip_components: 1 срезает префикс deploy/ из путей-источников.
          target: "/opt/stardust/"
          strip_components: 1

      - name: Pull images and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/stardust
            # Фиксируем имя проекта, чтобы контейнеры с жёстким container_name
            # (launcher-*) не оказались "чужими" и не ломали up конфликтом имён.
            export COMPOSE_PROJECT_NAME=stardust
            docker compose pull
            # Пересоздаём стек начисто: сносим контейнеры проекта и orphan'ов.
            docker compose down --remove-orphans
            # Подстраховка от контейнеров, оставшихся от старого имени проекта.
            for name in launcher-auth-db launcher-auth-server launcher-admin-server \
                        launcher-telegram-bot launcher-squid launcher-admin-web launcher-website; do
              if [ -n "$(docker ps -aq -f "name=^/${name}$")" ]; then
                docker rm -f "$name" >/dev/null 2>&1 || true
              fi
            done
            docker compose up -d --remove-orphans
            docker compose ps
