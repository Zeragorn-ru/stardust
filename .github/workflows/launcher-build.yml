# Отладочная сборка лаунчера без git-тега.
# Секреты — на уровне job env. macOS → environment launcher-release.

name: launcher-build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Платформа"
        type: choice
        default: linux
        options:
          - all
          - windows
          - linux
          - macos
      upload_release:
        description: "Загрузить в существующий GitHub Release"
        type: boolean
        default: false
      release_tag:
        description: "Тег (vX.Y.Z), если upload_release=true"
        type: string
        default: ""
      version:
        description: "Версия для сборки (без v), пусто = не менять"
        type: string
        default: ""

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows
            platform: windows-latest
            tauri-args: ""
          - id: linux
            platform: ubuntu-22.04
            tauri-args: ""
          - id: macos
            platform: macos-latest
            tauri-args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    environment: ${{ matrix.id == 'macos' && 'launcher-release' || '' }}
    env:
      CI: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    if: >-
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == matrix.id
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "① Linux deps"
        if: matrix.platform == 'ubuntu-22.04'
        uses: ./.github/actions/launcher-setup-linux

      - name: "② Toolchain & caches"
        uses: ./.github/actions/launcher-setup-toolchain
        with:
          platform: ${{ matrix.platform }}
          cache-key-suffix: build
          save-cache: "false"

      - name: "③ npm ci"
        uses: ./.github/actions/launcher-install-deps

      - name: "⑥ Set version (manual)"
        if: github.event.inputs.version != ''
        uses: ./.github/actions/launcher-set-version
        with:
          version: ${{ github.event.inputs.version }}

      - name: "④ Clippy"
        uses: ./.github/actions/launcher-clippy

      - name: "⑤ Bootstrap (Windows)"
        if: matrix.id == 'windows'
        uses: ./.github/actions/launcher-build-bootstrap
        with:
          platform: ${{ matrix.platform }}

      - name: "⑦b macOS signing"
        if: matrix.id == 'macos'
        uses: ./.github/actions/launcher-setup-macos-signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: "⑧ Tauri build"
        uses: ./.github/actions/launcher-tauri-build
        with:
          tauri-args: ${{ matrix.tauri-args }}
          release-draft: "true"
          prerelease: "true"
        env:
          APPLE_CERTIFICATE: ${{ matrix.id == 'macos' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.id == 'macos' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ matrix.id == 'macos' && secrets.KEYCHAIN_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.id == 'macos' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.id == 'macos' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.id == 'macos' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.id == 'macos' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.id == 'macos' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}

      - name: "⑧b DMG webloc"
        if: matrix.id == 'macos'
        uses: ./.github/actions/launcher-inject-dmg-webloc
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}

      - name: "⑨ Collect bundles"
        if: always()
        uses: ./.github/actions/launcher-collect-bundles

      - name: "⑩ Upload CI artifacts"
        if: always()
        uses: ./.github/actions/launcher-upload-ci-artifacts
        with:
          artifact-name: launcher-build-${{ matrix.id }}

      - name: "⑪ Upload GitHub Release (optional)"
        if: github.event.inputs.upload_release == 'true' && github.event.inputs.release_tag != ''
        uses: ./.github/actions/launcher-upload-release
        with:
          tag: ${{ github.event.inputs.release_tag }}
