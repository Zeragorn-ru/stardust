# Docker Compose для бекенда лаунчера.
#
# Образы auth-server, admin-server и admin-web собираются CI
# (.github/workflows/backend.yml) и публикуются в ghcr.io. На сервере ничего
# не собирается — только скачиваются готовые образы.
#
# Запуск (из каталога deploy/):
#   cp .env.example .env       # и отредактируй пароли/адреса
#   docker compose pull        # скачать образы из ghcr.io
#   docker compose up -d       # поднять (сборки не будет)
#
# Обновление бекенда после нового пуша образов CI:
#   bash update.sh

services:
  auth-db:
    image: postgres:17-alpine
    container_name: launcher-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Данные БД — ./data/db.
      - ./data/db:/var/lib/postgresql/data
    networks:
      - launcher-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # БД наружу не публикуем — доступ только внутри сети compose.

  auth-server:
    # Готовый образ из ghcr.io (собирается CI). На сервере не собирается.
    # При необходимости переопредели образ/тег через AUTH_IMAGE в .env.
    image: ${AUTH_IMAGE:-ghcr.io/zeragorn-ru/stardust/auth-server:latest}
    pull_policy: always
    container_name: launcher-auth-server
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      AUTH_BIND: 0.0.0.0:8080
      # Строка подключения PostgreSQL. Миграции применяются автоматически
      # при старте auth-server (sqlx migrate).
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/${POSTGRES_DB}
      # Публичный URL, под которым сервер виден игре (текстуры, skinDomains).
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:-http://127.0.0.1:8080}
      # Ключ подписи Yggdrasil лежит в volume — иначе при пересоздании
      # контейнера он сгенерируется заново и все выданные подписи протухнут.
      AUTH_KEY_PATH: /data/yggdrasil_key.pem
      RUST_LOG: ${RUST_LOG:-auth_server=info}
      LOG_DIR: /app/logs
    volumes:
      # Ключ подписи Yggdrasil — ./data/keys.
      - ./data/keys:/data
      # Логи — ./logs/auth-server/.
      - ./logs/auth-server:/app/logs
    ports:
      - "${AUTH_PORT:-8080}:8080"
    networks:
      - launcher-net

  admin-server:
    # REST API админки сборок. Использует ту же БД (аккаунты/сессии общие с
    # auth-server). Наружу напрямую не публикуется — доступ только через
    # admin-web (nginx). Образ из ghcr.io, переопределяется через ADMIN_IMAGE.
    image: ${ADMIN_IMAGE:-ghcr.io/zeragorn-ru/stardust/admin-server:latest}
    pull_policy: always
    container_name: launcher-admin-server
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      ADMIN_BIND: 0.0.0.0:8081
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/${POSTGRES_DB}
      # Каталог с байтами файлов сборок (content-addressable storage).
      MODPACK_DIR: /data/modpack
      # Публичный URL раздачи файлов — попадает в манифест, который качает
      # лаунчер. Должен указывать на публичный admin-web (/files).
      FILES_BASE_URL: ${FILES_BASE_URL:-http://127.0.0.1:8082/files}
      # Логины (через запятую), которым при старте выдаётся роль admin.
      # Нужно для самого первого админа: регистрация всегда создаёт user.
      # Идемпотентно — можно оставить переменную навсегда.
      ADMIN_BOOTSTRAP: ${ADMIN_BOOTSTRAP:-}
      RUST_LOG: ${ADMIN_RUST_LOG:-admin_server=info,tower_http=warn}
      LOG_DIR: /app/logs
    volumes:
      # Файлы сборок — ./data/modpack.
      - ./data/modpack:/data/modpack
      # Логи — ./logs/admin-server/.
      - ./logs/admin-server:/app/logs
    networks:
      - launcher-net

  telegram-bot:
    # Тонкий сервис доставки 2FA-кодов и админских уведомлений. Логики нет —
    # всё через общую БД (outbox + settings). Токен бота задаётся в веб-админке
    # и хранится в settings, поэтому из окружения нужен только DATABASE_URL.
    # Наружу ничего не публикует. Образ из ghcr.io, переопределяется через
    # TELEGRAM_BOT_IMAGE.
    image: ${TELEGRAM_BOT_IMAGE:-ghcr.io/zeragorn-ru/stardust/telegram-bot:latest}
    pull_policy: always
    container_name: launcher-telegram-bot
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/${POSTGRES_DB}
      RUST_LOG: ${TELEGRAM_BOT_RUST_LOG:-telegram_bot=info}
      LOG_DIR: /app/logs
    volumes:
      # Логи — ./logs/telegram-bot/.
      - ./logs/telegram-bot:/app/logs
    networks:
      - launcher-net

  squid:
    image: ubuntu/squid:latest
    container_name: launcher-squid
    restart: unless-stopped
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    ports:
      - "3128:3128"
    networks:
      - launcher-net

  admin-web:
    # Статика SPA + reverse-proxy на admin-server. Единственная публичная
    # точка входа для админки и для раздачи манифеста/файлов лаунчеру.
    image: ${ADMIN_WEB_IMAGE:-ghcr.io/zeragorn-ru/stardust/admin-web:latest}
    pull_policy: always
    container_name: launcher-admin-web
    restart: unless-stopped
    depends_on:
      - admin-server
    ports:
      - "${ADMIN_WEB_PORT:-8082}:80"
    networks:
      - launcher-net

  website:
    # Публичный сайт сервера (лендинг). Статика на nginx.
    image: ${WEBSITE_IMAGE:-ghcr.io/zeragorn-ru/stardust/website:latest}
    pull_policy: always
    container_name: launcher-website
    restart: unless-stopped
    ports:
      - "${WEBSITE_PORT:-8083}:80"
    networks:
      - launcher-net

networks:
  launcher-net:
    driver: bridge
