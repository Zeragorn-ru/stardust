# nginx для admin-web: раздаёт собранную SPA и проксирует запросы к admin-server.
#
# admin-server наружу не публикуется — единственная публичная точка входа это
# nginx. Лаунчер ходит за манифестом и файлами сборки через тот же хост
# (/manifest и /files), поэтому FILES_BASE_URL у admin-server должен указывать
# на публичный https://<host>/files.

server {
    listen 80;
    server_name _;

    # Docker DNS. Резолвим admin-server в рантайме (через переменную в
    # proxy_pass), а не один раз при старте через upstream{}. Иначе если
    # admin-server ещё не поднялся, nginx падает с "host not found in upstream"
    # и уходит в crash-loop, утаскивая за собой публичную точку входа.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $admin_server admin-server:8081;

    root /usr/share/nginx/html;
    index index.html;

    # Крупные jar-моды: держим заодно с лимитом тела axum (512 МБ).
    client_max_body_size 512m;

    # API админки.
    location /api/ {
        proxy_pass http://$admin_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Долгие загрузки файлов не должны рваться по таймауту.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }

    # Публичные маршруты для лаунчера.
    location = /manifest {
        proxy_pass http://$admin_server;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        proxy_pass http://$admin_server;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /authlib-injector.jar {
        proxy_pass http://$admin_server;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: всё остальное отдаём index.html (клиентский роутинг).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
