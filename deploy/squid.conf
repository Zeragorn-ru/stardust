# Squid: CONNECT-прокси только для доменов которые нужны NeoForge installer
# и лаунчеру. Всё остальное запрещено.

acl allowed_sites dstdomain maven.neoforged.net libraries.minecraft.net piston-meta.mojang.com piston-data.mojang.com resources.download.minecraft.net api.adoptium.net github.com objects.githubusercontent.com

http_access allow allowed_sites
http_access deny all

http_port 3128

# Не пишем логи доступа (лишний шум).
access_log none
